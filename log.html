<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bidiyah Hospital - Usage Log (Shared)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="logo.png" class="logo" alt="MOH Logo">
      <div class="titles">
        <h1>Bidiyah Hospital</h1>
        <h2>Usage Log</h2>
      </div>
    </div>

    <nav class="topnav">
      <a class="navlink" href="index.html">Register</a>
      <a class="navlink active" href="log.html">View Log</a>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <div class="table-head">
        <h3>All Records</h3>
        <div class="table-actions">
          <button class="btn secondary" id="btnRefresh" type="button">Refresh</button>
          <button class="btn secondary" id="btnPrint" type="button">Print</button>
          <button class="btn" id="btnExportCSV" type="button">Export CSV</button>
        </div>
      </div>

      <div class="filters">
        <div>
          <label>Filter: Department</label>
          <select id="filterDept">
            <option value="">All</option>
          </select>
        </div>
        <div>
          <label>Filter: Shift</label>
          <select id="filterShift">
            <option value="">All</option>
            <option>Morning</option>
            <option>Evening</option>
            <option>Night</option>
          </select>
        </div>
        <div>
          <label>Search: Staff</label>
          <input id="filterStaff" type="text" placeholder="type staff no or name..." />
        </div>
      </div>

      <div class="table-wrap">
        <table id="logTable"></table>
      </div>
    </section>

    <footer class="footer">PREPARED BY: JOUHARAH.IT</footer>
  </main>

  <script>
    window.APP_MODE = "log";
  </script>
  <script src="script.js"></script>
</body>
</html>
