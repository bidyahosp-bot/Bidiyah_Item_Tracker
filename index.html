
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bidiyah Hospital</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Record Usage</h2>

<input id="staff" placeholder="Staff Name">

<select id="shift">
<option>Morning</option>
<option>Evening</option>
<option>Night</option>
</select>

<select id="department">
<option>OPD</option>
<option>DM</option>
<option>IP</option>
<option>ANC</option>
<option>L.R</option>
</select>

<select id="signedBy">
<option>Sender</option>
<option>Receiver</option>
</select>

<select id="setStatus">
<option value="Complete">Complete</option>
<option value="Not Complete">Not Complete</option>
</select>

<h3>Items</h3>
<div id="itemsGrid" class="items-grid"></div>

<button id="btnSave">Save</button>
<button id="btnRefresh">Refresh</button>

<hr>

<h3>Recent Records</h3>
<table id="recentTable"></table>

<!-- EDIT POPUP -->
<div id="editModal" class="modal">
  <div class="modal-content">

<h4>Edit Items</h4>
<div id="editItemsGrid" class="items-grid"></div>

    <h3>Edit Record</h3>

    <input id="editStaff">

    <select id="editShift">
      <option>Morning</option>
      <option>Evening</option>
      <option>Night</option>
    </select>

    <select id="editDepartment">
      <option>OPD</option>
      <option>DM</option>
      <option>IP</option>
      <option>ANC</option>
      <option>L.R</option>
    </select>

    <select id="editSignedBy">
      <option>Sender</option>
      <option>Receiver</option>
    </select>

    <select id="editStatus">
      <option value="Complete">Complete</option>
      <option value="Not Complete">Not Complete</option>
    </select>

    <br><br>
    <button onclick="saveEdit()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
